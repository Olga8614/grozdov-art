<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grozdov Art Jewelry</title>
  <meta name="description" content="Handmade sterling silver jewelry with natural gemstones.">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #faf7f2;
      color: #222;
      text-align: center;
    }
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 40px 20px;
      box-sizing: border-box;
    }
    h1 {
      font-size: 48px;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    p {
      font-size: 20px;
      max-width: 650px;
      margin: 10px auto 30px;
      line-height: 1.5;
    }
    .button {
      display: inline-block;
      padding: 14px 28px;
      background: #222;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-size: 18px;
    }
    .button:hover {
      background: #555;
    }
    .small {
      margin-top: 30px;
      font-size: 14px;
      color: #777;
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1>Grozdov Art Jewelry</h1>
    <p>
      Handmade sterling silver jewelry with natural gemstones,
      inspired by desert landscapes, ancient forms, and the quiet beauty of stone.
    </p>

    <a class="button" href="https://grozdovs.square.site/" target="_blank" rel="noopener">
      Shop Jewelry
    </a>

    <div class="small">
      Handmade in California · Sterling silver · Natural stones
    </div>
  </main>
</body>
</html>
