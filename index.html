<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Grozdov Art Jewelry</title>
  <meta name="description" content="Handmade sterling silver jewelry with natural gemstones.">
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: #222;
  }

  .hero {
    position: relative;
    height: 100vh;
    background: url('photo.jpg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .overlay {
    background: rgba(0, 0, 0, 0.35);
    padding: 40px;
    text-align: center;
    color: white;
  }

  h1 {
    font-size: 48px;
    margin-bottom: 10px;
    letter-spacing: 2px;
  }

  p {
    font-size: 18px;
    margin-bottom: 25px;
  }

  .button {
    padding: 14px 28px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 999px;
    font-size: 16px;
  }

  .button:hover {
    background: #ddd;
  }
</style>

<body>
  <div class="hero">
    <div class="overlay">
      <h1>Grozdov Art Jewelry</h1>
      <p>Handmade sterling silver jewelry with natural gemstones</p>

      <a class="button" href="https://grozdovs.square.site" target="_blank">
        Shop
      </a>
    </div>
  </div>
</body>
